services:
backend:
  container_name: erp_backend
  image: erp_backend
  build: .

  ports:
    - "3000:3000"

  env_file:
    - .env

  volumes:
    - /www/uploads:/app/uploads

  depends_on:
    - postgres

  networks:
    - default

  postgres:
    container_name: erp_postgres
    image: postgres:15
    ports:
      - "5432:5432"  # Exponer el puerto 5432 para PostgreSQL
    environment:
      POSTGRES_USER: "erp_user"
      POSTGRES_PASSWORD: "Erp123456!"
      POSTGRES_DB: "erp_saas"
    networks:
      - default  # Usamos la red predeterminada de Docker

networks:
  default:  # Red predeterminada de Docker, no necesitamos una red personalizada
    driver: bridge